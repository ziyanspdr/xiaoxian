<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌸 小傻贤的窝</title>
<script src="https://unpkg.com/mqtt@5.10.3/dist/mqtt.min.js"></script>
<style>
:root{
  --sage:#C8D8D0; --mint:#A8C8B8; --teal:#88B8A8; --deep:#4A6A5A;
  --warm:#F5F0EC; --golden:#B8A890; --card:rgba(255,255,255,0.65); --card-hover:rgba(255,255,255,0.88);
  --shadow:0 4px 24px rgba(74,106,90,0.06); --shadow-md:0 8px 32px rgba(74,106,90,0.08);
  --shadow-lg:0 16px 48px rgba(74,106,90,0.10); --radius:22px; --radius-sm:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Georgia','Noto Serif SC','STSong','Songti SC',serif;
  background:var(--warm);color:var(--deep);
  overflow-x:hidden;line-height:1.75;min-height:100vh;
}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.loading-screen{
  position:fixed;inset:0;z-index:9999;background:var(--warm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s,visibility .6s;gap:1.5rem;
}
.loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-dots{display:flex;gap:8px}
.loader-dots span{width:10px;height:10px;border-radius:50%;background:var(--teal);animation:dotB 1.4s infinite}
.loader-dots span:nth-child(2){animation-delay:.2s}
.loader-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotB{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-16px)}}
.loading-screen .loader-text{color:var(--teal);font-size:1rem;letter-spacing:3px}

/* Nav */
nav{
  position:fixed;top:0;width:100%;z-index:100;
  background:rgba(245,240,236,0.78);backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid rgba(168,200,176,0.10);padding:0 2rem;
}
nav.scrolled{background:rgba(245,240,236,0.94);box-shadow:0 1px 20px rgba(74,106,90,0.04)}
nav .inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:78px}
nav .logo-group{display:flex;align-items:center;gap:10px}
nav .logo-icon{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage),var(--mint));
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;flex-shrink:0;
}
nav .logo-icon img{width:100%;height:100%;object-fit:cover;border-radius:50%}
nav .logo-text{font-size:1.2rem;color:var(--teal);font-weight:bold;letter-spacing:3px}
nav .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
nav .nav-links{display:flex;gap:2.4rem;list-style:none;align-items:center}
nav .nav-links a{text-decoration:none;color:var(--deep);font-size:.9rem;letter-spacing:1.5px;position:relative;padding:6px 0;transition:color .35s}
nav .nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--mint);transition:width .4s}
nav .nav-links a:hover{color:var(--teal)}
nav .nav-links a:hover::after{width:100%}
.menu-btn{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--teal)}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:5px;transition:background .3s}
.sync-dot.connected{background:#7cb8a0;box-shadow:0 0 6px rgba(124,184,160,0.4)}
.sync-dot.connecting{background:#d4b88a;animation:blink 1s infinite}
.sync-dot.disconnected{background:#d4a0a0}

/* Sections */
section{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:5rem 2rem 4rem}
section:first-of-type{padding-top:9rem}

/* Hero */
.hero{text-align:center}
.hero .memory-counter{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.6);padding:10px 22px;
  border-radius:30px;margin-bottom:2rem;font-size:.85rem;
  color:var(--golden);letter-spacing:2px;border:1px solid rgba(168,200,176,0.12);
}
.hero .memory-counter .count{color:var(--teal);font-weight:bold;font-size:1.1rem}
.hero .avatar-wrap{position:relative;display:inline-block;margin-bottom:2rem}
.hero .avatar{
  width:130px;height:130px;border-radius:50%;
  background:linear-gradient(145deg,var(--sage),var(--mint),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-size:3.5rem;box-shadow:0 16px 48px rgba(136,184,168,0.2);
  animation:float 3.5s ease-in-out infinite;border:3px solid rgba(255,255,255,0.6);
  overflow:hidden;cursor:pointer;transition:transform .3s;position:relative;
}
.hero .avatar:hover{transform:scale(1.06)}
.hero .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero .avatar .avatar-emoji{position:absolute}
.hero .avatar .avatar-hint{
  position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.45);
  color:#fff;font-size:.65rem;padding:6px 0;opacity:0;transition:opacity .3s;text-align:center;
}
.hero .avatar:hover .avatar-hint{opacity:1}
.hero .avatar::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse at 26% 18%,rgba(255,255,255,0.18),transparent 45%);
  pointer-events:none;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero .sparkle{position:absolute;font-size:.9rem;animation:spF 2.5s ease-in-out infinite}
.hero .sparkle:nth-child(2){top:5px;right:-8px;animation-delay:0s}
.hero .sparkle:nth-child(3){bottom:12px;left:-14px;animation-delay:.7s}
.hero .sparkle:nth-child(4){top:18px;left:-18px;animation-delay:1.4s}
@keyframes spF{0%,100%{transform:translateY(0)scale(1);opacity:.5}50%{transform:translateY(-8px)scale(1.2);opacity:1}}
.hero h1{font-size:2.6rem;font-weight:normal;margin-bottom:.4rem;letter-spacing:2px}
.hero h1 .name{color:var(--teal);font-weight:bold}
.hero h1 .wave{display:inline-block;animation:wave 2s infinite;transform-origin:70% 70%}
@keyframes wave{0%,100%{transform:rotate(0deg)}25%{transform:rotate(15deg)}75%{transform:rotate(-10deg)}}
.hero .subtitle{font-size:1rem;color:var(--golden);letter-spacing:5px;margin-bottom:1rem;font-weight:300}
.hero .mood-today{display:inline-flex;align-items:center;gap:10px;font-size:.9rem;color:#7a8a82;margin-bottom:1.5rem}
.hero .mood-today .mood-emoji{font-size:1.6rem;cursor:pointer;transition:transform .3s}
.hero .mood-today .mood-emoji:hover{transform:scale(1.25)}
.hero .motto{font-style:italic;color:#7a8a82;max-width:520px;margin:0 auto 2rem;font-size:1.05rem;line-height:1.9}
.hero .scroll-hint{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;color:var(--golden);letter-spacing:2px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(8px);opacity:1}}
.divider{text-align:center;padding:2rem 0;color:var(--mint);font-size:1.1rem;letter-spacing:4px;opacity:.5}

/* Section Title */
.section-title{text-align:center;margin-bottom:3rem}
.section-title .emoji{font-size:1.8rem;display:block;margin-bottom:.5rem}
.section-title h2{font-size:1.8rem;font-weight:normal;letter-spacing:4px}
.section-title .line{width:36px;height:2px;background:linear-gradient(90deg,var(--sage),var(--teal));margin:.8rem auto 0;border-radius:1px}
.section-title p{color:var(--golden);font-size:.9rem;margin-top:.5rem;letter-spacing:1px}

/* Gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.2rem}
.gallery-item{
  position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;
  aspect-ratio:4/3;background:linear-gradient(135deg,var(--sage),var(--mint));
  box-shadow:var(--shadow);transition:all .5s;
}
.gallery-item::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(74,106,90,0.45));z-index:1;opacity:0;transition:opacity .5s}
.gallery-item:hover::before{opacity:1}
.gallery-item:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .7s}
.gallery-item:hover img{transform:scale(1.06)}
.gallery-item .overlay{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:1.4rem;opacity:0;transition:opacity .5s}
.gallery-item:hover .overlay{opacity:1}
.gallery-item .overlay span{color:#fff;font-size:.9rem;letter-spacing:2px}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(18,22,20,0.94);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .45s;backdrop-filter:blur(12px)}
.lightbox.active{opacity:1;pointer-events:auto}
.lightbox img,.lightbox video{max-width:90vw;max-height:82vh;border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,0.35)}
.lightbox .lb-close{position:absolute;top:2rem;right:2rem;background:rgba(255,255,255,0.12);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:1.4rem;cursor:pointer;transition:all .35s;display:flex;align-items:center;justify-content:center}
.lightbox .lb-close:hover{background:rgba(255,255,255,0.22);transform:rotate(90deg)}
.lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:1.2rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.lightbox .lb-nav:hover{background:rgba(255,255,255,0.18)}
.lightbox .lb-prev{left:1.5rem}.lightbox .lb-next{right:1.5rem}
.lightbox .lb-caption{position:absolute;bottom:2rem;color:rgba(255,255,255,0.75);font-size:.9rem;letter-spacing:3px}
.lightbox .lb-counter{position:absolute;top:2rem;left:2rem;color:rgba(255,255,255,0.5);font-size:.85rem;letter-spacing:2px}

/* Moments */
.moments-section{max-width:680px;margin:0 auto}
.moment-composer{background:var(--card);backdrop-filter:blur(10px);border-radius:var(--radius);padding:1.6rem;box-shadow:var(--shadow);border:1px solid rgba(168,200,176,0.06);margin-bottom:2rem;transition:all .4s}
.moment-composer:hover{box-shadow:var(--shadow-lg)}
.moment-composer .composer-header{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.moment-composer .composer-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--mint));flex-shrink:0;overflow:hidden;position:relative}
.moment-composer .composer-avatar img{display:block;width:44px;height:44px;object-fit:cover;border-radius:50%}
.moment-composer .composer-avatar span{display:block;width:44px;height:44px;line-height:44px;text-align:center;border-radius:50%}
.moment-composer textarea{width:100%;padding:1rem 1.2rem;border:2px solid rgba(168,200,176,0.15);border-radius:var(--radius-sm);font-size:.95rem;font-family:inherit;background:rgba(255,255,255,0.5);outline:none;transition:all .35s;resize:vertical;min-height:90px}
.moment-composer textarea:focus{border-color:rgba(136,184,168,0.3)}
.moment-composer .composer-actions{display:flex;align-items:center;gap:1rem;margin-top:1rem}
.composer-actions .upload-btn{font-size:.85rem;color:#8a9a92;cursor:pointer;transition:color .3s}
.composer-actions .upload-btn:hover{color:var(--teal)}
.composer-actions .post-btn{margin-left:auto;background:linear-gradient(135deg,var(--mint),var(--teal));border:none;border-radius:12px;padding:8px 24px;color:#fff;font-weight:bold;cursor:pointer;font-size:.85rem;letter-spacing:2px;transition:all .3s}
.composer-actions .post-btn:hover{transform:scale(1.05);filter:brightness(1.05)}
.composer-actions .post-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.media-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.media-preview img,.media-preview video{width:80px;height:80px;object-fit:cover;border-radius:10px}
.moment-card{background:var(--card);backdrop-filter:blur(10px);border-radius:var(--radius);padding:1.6rem;box-shadow:var(--shadow);border:1px solid rgba(168,200,176,0.06);transition:all .4s;animation:fadeSlide .5s ease}
.moment-card:hover{box-shadow:var(--shadow-md)}
.moment-card .moment-header{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.moment-card .moment-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--mint));flex-shrink:0;overflow:hidden;position:relative}
.moment-card .moment-avatar img{display:block;width:44px;height:44px;object-fit:cover;border-radius:50%}
.moment-card .moment-avatar .ma-span{display:block;width:44px;height:44px;line-height:44px;text-align:center;border-radius:50%;font-size:1.4rem}
.moment-card .moment-user{font-weight:bold;font-size:.95rem;color:var(--deep)}
.moment-card .moment-time{font-size:.75rem;color:#b5c5bd}
.moment-card .moment-text{font-size:.95rem;color:#4a5a52;line-height:1.8;margin-bottom:.8rem;white-space:pre-wrap}
.moment-card .moment-media{display:grid;gap:6px;margin-bottom:.8rem}
.moment-card .moment-media.grid-1{grid-template-columns:1fr}
.moment-card .moment-media.grid-2{grid-template-columns:1fr 1fr}
.moment-card .moment-media.grid-3{grid-template-columns:1fr 1fr 1fr}
.moment-card .moment-media img,.moment-card .moment-media video{width:100%;border-radius:12px;object-fit:cover;cursor:pointer;transition:transform .3s}
.moment-card .moment-media img{aspect-ratio:4/3}
.moment-card .moment-media img:hover{transform:scale(1.03)}
.moment-card .moment-actions-bar{display:flex;gap:2rem;padding-top:.8rem;border-top:1px solid rgba(168,200,176,0.08)}
.moment-card .moment-actions-bar button{background:none;border:none;cursor:pointer;font-size:.85rem;color:#b5c5bd;display:flex;align-items:center;gap:4px;transition:all .3s;font-family:inherit;letter-spacing:1px}
.moment-card .moment-actions-bar button.liked{color:var(--teal)}
.moment-card .moment-actions-bar button:hover{color:var(--teal)}
.moment-card .moment-actions-bar .del-moment{margin-left:auto;color:#c8b0b0;font-size:.75rem}

/* Notes */
.notes-section{max-width:800px;margin:0 auto}
.note-composer{background:var(--card);backdrop-filter:blur(10px);border-radius:var(--radius);padding:1.6rem;box-shadow:var(--shadow);border:1px solid rgba(168,200,176,0.06);margin-bottom:2rem}
.note-composer input,.note-composer textarea,.note-composer select{width:100%;padding:.8rem 1rem;border:2px solid rgba(168,200,176,0.12);border-radius:var(--radius-sm);font-size:.9rem;font-family:inherit;background:rgba(255,255,255,0.5);outline:none;transition:all .3s;margin-bottom:.8rem}
.note-composer input:focus,.note-composer textarea:focus{border-color:rgba(136,184,168,0.3)}
.note-composer textarea{min-height:120px;resize:vertical}
.note-composer .note-submit{background:linear-gradient(135deg,var(--mint),var(--teal));border:none;border-radius:12px;padding:10px 28px;color:#fff;font-weight:bold;cursor:pointer;font-size:.9rem;letter-spacing:2px;transition:all .3s}
.note-composer .note-submit:hover{transform:scale(1.04);filter:brightness(1.05)}
.note-display-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.2rem}
.note-display-card{
  background:var(--card);backdrop-filter:blur(10px);border-radius:var(--radius);padding:1.6rem;
  box-shadow:var(--shadow);border:1px solid rgba(168,200,176,0.06);transition:all .45s;position:relative;overflow:hidden;
}
.note-display-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--mint),var(--teal),var(--sage),var(--sky))}
.note-display-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.note-display-card .nd-mood{font-size:2.2rem;margin-bottom:.5rem;display:block}
.note-display-card .nd-title{font-size:1.05rem;font-weight:bold;margin-bottom:.5rem;color:var(--deep);letter-spacing:1px}
.note-display-card .nd-date{font-size:.75rem;color:var(--golden);letter-spacing:2px;margin-bottom:.8rem}
.note-display-card .nd-body{font-size:.9rem;color:#5a6a62;line-height:1.8;white-space:pre-wrap}
.note-display-card .nd-memory-badge{display:inline-block;font-size:.7rem;padding:3px 10px;border-radius:12px;background:rgba(136,184,168,0.12);color:var(--teal);letter-spacing:1px;margin-top:.8rem}
.note-display-card.featured{grid-column:1/-1;background:linear-gradient(135deg,rgba(200,216,208,0.2),rgba(168,200,176,0.15));border:2px solid rgba(136,184,168,0.15)}
.note-display-card .nd-delete{
  position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;z-index:2;
  background:rgba(180,200,190,0.25);backdrop-filter:blur(4px);
  font-size:.85rem;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .3s;color:#7a8a82;
}
.note-display-card:hover .nd-delete{opacity:1}
.note-display-card .nd-delete:hover{background:rgba(168,200,176,0.35);color:var(--teal);transform:scale(1.1)}

/* Toast */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:999;
  background:rgba(245,240,236,0.9);backdrop-filter:blur(16px);
  border:1px solid rgba(168,200,176,0.12);border-radius:16px;
  padding:10px 24px;color:var(--deep);font-size:.9rem;letter-spacing:2px;
  box-shadow:0 8px 32px rgba(74,106,90,0.08);
  opacity:0;transition:all .4s;
}
.toast.show{opacity:1}

.toast2{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:999;
  background:rgba(245,240,236,0.9);backdrop-filter:blur(16px);
  border:1px solid rgba(168,200,176,0.12);border-radius:16px;
  padding:10px 24px;color:var(--deep);font-size:.9rem;letter-spacing:2px;
  box-shadow:0 8px 32px rgba(74,106,90,0.08);
  opacity:0;transition:all .4s;
}
.toast2.show{opacity:1}

/* Firefly */
.firefly-msg{text-align:center;font-size:.8rem;color:#8a9a92;letter-spacing:3px;margin-top:3rem;font-style:italic}

/* Scroll Reveal */
.reveal{opacity:0;transform:translateY(30px);transition:all .7s}
.reveal.visible{opacity:1;transform:translateY(0)}

/* Responsive */
@media(max-width:768px){
  nav .nav-links{display:none;position:fixed;top:78px;left:0;right:0;background:rgba(245,240,236,0.96);backdrop-filter:blur(20px);flex-direction:column;padding:1.2rem 2rem;gap:1.2rem;border-bottom:1px solid rgba(168,200,176,0.1)}
  nav .nav-links.open{display:flex}
  .menu-btn{display:block}
  .hero h1{font-size:2rem}
  .hero .avatar{width:110px;height:110px;font-size:2.8rem}
  section{padding:3.5rem 1.2rem 3rem}
  section:first-of-type{padding-top:7rem}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .note-display-cards{grid-template-columns:1fr}
  .moment-card .moment-media.grid-3{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loader-dots"><span></span><span></span><span></span></div>
  <div class="loader-text">🌸 加载中...</div>
</div>

<canvas id="particles"></canvas>

<!-- Toast -->
<div class="toast" id="toast">🌸 已保存</div>

<!-- Avatar Input -->
<input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">

<!-- Nav -->
<nav id="navbar"><div class="inner">
  <div class="logo-group">
    <div class="logo-icon" id="navAvatar"><span class="avatar-emoji" style="display:none">🦌</span></div>
    <span class="dot"></span>
    <span class="sync-dot connecting" id="syncStatus" title="连接中..."></span>
    <span class="logo-text">小傻贤</span>
    
  </div>
  <button class="menu-btn" onclick="toggleMenu()" aria-label="菜单">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="#gallery">📷 瞬间</a></li>
    <li><a href="#moments">💬 动态</a></li>
    <li><a href="#notes">📖 笔记</a></li>
  </ul>
</div></nav>

<!-- Hero -->
<section class="hero">
  <div class="memory-counter">🌸 已记录 <span class="count" id="totalMemories">0</span> 份温柔</div>
  <div class="avatar-wrap">
    <div class="avatar" id="heroAvatar" onclick="document.getElementById('avatarInput').click()" title="点我上传头像">
      <span class="avatar-emoji" id="heroAvatarEmoji">🦌</span>
    </div>
    <span class="sparkle">✦</span>
    <span class="sparkle">✧</span>
    <span class="sparkle">✦</span>
  </div>
  <h1>小傻贤的<span class="name">窝</span><span class="wave">🌸</span></h1>
  <div class="subtitle">✦ 温柔有光 · 岁月安好 ✦</div>
  <div class="mood-today">
    <span>今日心情</span>

// ═══ PARTICLES ═══
(function(){
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var pArr = [], stars = [];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);

  // Floating stars (background twinkle)
  for(var i=0;i<40;i++){
    stars.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      size:Math.random()*1.5+0.3,
      speed:Math.random()*0.005+0.002,
      phase:Math.random()*Math.PI*2
    });
  }

  function Particle(){
    this.reset = function(){
      this.x = Math.random()*canvas.width;
      this.y = Math.random()*canvas.height;
      this.size = Math.random()*3.5+1;
      this.speedX = (Math.random()-0.5)*0.3;
      this.speedY = (Math.random()-0.5)*0.3;
      this.opacity = Math.random()*0.4+0.15;
      this.hue = 130+Math.random()*40;
      this.pulse = Math.random()*Math.PI*2;
      this.pulseSpeed = Math.random()*0.02+0.01;
      this.trail = [];
      this.maxTrail = 5;
    };
    this.reset();
    this.update = function(){
      this.trail.push({x:this.x,y:this.y,o:this.opacity});
      if(this.trail.length>this.maxTrail)this.trail.shift();

      this.x+=this.speedX;this.y+=this.speedY;
      this.pulse+=this.pulseSpeed;

      if(this.x<-20)this.x=canvas.width+20;if(this.x>canvas.width+20)this.x=-20;
      if(this.y<-20)this.y=canvas.height+20;if(this.y>canvas.height+20)this.y=-20;

      this.speedX+=(Math.random()-0.5)*0.004;
      this.speedY+=(Math.random()-0.5)*0.004;
      this.speedX=Math.max(-0.6,Math.min(0.6,this.speedX));
      this.speedY=Math.max(-0.6,Math.min(0.6,this.speedY));

      this.currentOpacity = this.opacity * (0.6 + 0.4 * Math.sin(this.pulse));
    };
    this.draw = function(){
      // Trail
      for(var t=0;t<this.trail.length;t++){
        var alpha = (t/this.trail.length)*0.15;
        ctx.fillStyle='hsla('+this.hue+',40%,75%,'+alpha+')';
        ctx.beginPath();ctx.arc(this.trail[t].x,this.trail[t].y,this.size*(t/this.trail.length)*0.6,0,Math.PI*2);ctx.fill();
      }

      // Glow outer
      var g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*3);
      g.addColorStop(0,'hsla('+this.hue+',60%,82%,'+this.currentOpacity+')');
      g.addColorStop(0.3,'hsla('+this.hue+',50%,78%,'+this.currentOpacity*0.5+')');
      g.addColorStop(1,'hsla('+this.hue+',40%,75%,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.size*3,0,Math.PI*2);ctx.fill();

      // Core glow
      var g2 = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*1.2);
      g2.addColorStop(0,'hsla(50,100%,95%,'+this.currentOpacity*0.9+')');
      g2.addColorStop(0.5,'hsla('+this.hue+',70%,85%,'+this.currentOpacity*0.7+')');
      g2.addColorStop(1,'hsla('+this.hue+',50%,75%,0)');
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(this.x,this.y,this.size*1.2,0,Math.PI*2);ctx.fill();

      // Bright center
      ctx.fillStyle='hsla(50,100%,98%,'+this.currentOpacity*0.6+')';
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*0.3,0,Math.PI*2);ctx.fill();
    };
  }
  for(var i=0;i<80;i++)pArr.push(new Particle());

  function drawConnections(){
    for(var i=0;i<pArr.length;i++){
      for(var j=i+1;j<pArr.length;j++){
        var dx=pArr[i].x-pArr[j].x,dy=pArr[i].y-pArr[j].y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<150){
          var alpha = 0.07 * (1 - dist/150) * (pArr[i].currentOpacity+pArr[j].currentOpacity)/2;
          ctx.strokeStyle='hsla(150,30%,78%,'+alpha+')';
          ctx.lineWidth=(pArr[i].size+pArr[j].size)/8;ctx.beginPath();ctx.moveTo(pArr[i].x,pArr[i].y);ctx.lineTo(pArr[j].x,pArr[j].y);ctx.stroke();
        }
      }
    }
  }

  var time=0;
  (function anim(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    time+=0.01;

    // Draw background stars
    stars.forEach(function(s){
      var bright = Math.sin(time*s.speed + s.phase)*0.5+0.5;
      ctx.fillStyle='hsla(150,20%,80%,'+bright*0.2+')';
      ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill();
    });

    pArr.forEach(function(p){p.update();p.draw()});
    drawConnections();
    requestAnimationFrame(anim);
  })();
})();

var pendingMedia=[];

// ═══ CLOUD STORAGE (MQTT retained messages) ═══
// Data is stored on the MQTT broker, new devices get it on subscribe

function cloudSave(type, data) {
  var str = JSON.stringify(data);
  try { localStorage.setItem('xx_cloud_' + type, str); } catch(e) {}
  // Publish with retain so new subscribers get the last value
  if (_mqttConnected) {
    try {
      _mqttClient.publish('xiaoxian/data/' + type, str, { qos: 1, retain: true });
    } catch(e) {}
  }
}

function cloudLoadAll() {
  // Request peers to send data
  if (_mqttConnected) {
    try {
      _mqttClient.publish('xiaoxian/request', JSON.stringify({ time: Date.now() }), { qos: 0 });
    } catch(e) {}
  }
  // Also check localStorage cache
  ['moments','notes','avatar'].forEach(function(type) {
    try {
      var cached = localStorage.getItem('xx_cloud_' + type);
      if (cached) {
        var data = JSON.parse(cached);
        var current = JSON.parse(localStorage.getItem('xx_' + type) || '[]');
        if (type === 'avatar') {
          if (!localStorage.getItem('xx_avatar')) {
            localStorage.setItem('xx_avatar', data);
            updateAllAvatars(data);
          }
        } else if (Array.isArray(data) && data.length > (current.length || 0)) {
          localStorage.setItem('xx_' + type, JSON.stringify(data));
          if (type === 'moments') renderMoments();
          if (type === 'notes') renderNoteDisplay();
          updateTotalMemories();
        }
      }
    } catch(e) {}
  });
}

function getMoments(){try{return JSON.parse(localStorage.getItem('xx_moments')||'[]')}catch(e){return[]}}

  var photos=document.getElementById('momentPhoto').files;
  for(var i=0;i<Math.min(photos.length,9);i++){(function(file){var reader=new FileReader();reader.onload=function(e){pendingMedia.push({type:'image',data:e.target.result,file:file});var img=document.createElement('img');img.className='preview-thumb';img.src=e.target.result;preview.appendChild(img)};reader.readAsDataURL(file)})(photos[i])}
  var video=document.getElementById('momentVideo').files[0];
  if(video){var vreader=new FileReader();vreader.onload=function(e){pendingMedia.push({type:'video',data:e.target.result,file:video});var vid=document.createElement('video');vid.className='preview-thumb';vid.src=e.target.result;vid.muted=true;preview.appendChild(vid)};vreader.readAsDataURL(video)}
}
function postMoment(){var text=document.getElementById("momentText").value.trim();if(!text&&pendingMedia.length===0){showToast("写点什么或者上传照片/视频吧～");return}

  moments.push(moment);saveMoments(moments);
  document.getElementById("momentText").value="";document.getElementById("momentPhoto").value="";document.getElementById("momentVideo").value="";document.getElementById("mediaPreview").innerHTML="";pendingMedia=[];
  renderMoments();updateTotalMemories();showToast("🌸 发布成功！")}

    var realIdx=moments.length-1-i,mediaHtml='';
    if(m.media&&m.media.length>0){var gc='grid-'+Math.min(m.media.length,3);mediaHtml='<div class="moment-media '+gc+'">';m.media.forEach(function(med){if(med.type==='image')mediaHtml+='<img src="'+med.data+'" alt="动态图片" loading="lazy">';else mediaHtml+='<video src="'+med.data+'" controls preload="metadata"></video>'});mediaHtml+='</div>'}
    var div=document.createElement('div');div.className='moment-card';
    div.innerHTML='<div class="moment-header">'+avatarHTML+'<div><div class="moment-user">小傻贤</div><div class="moment-time">'+m.time+'</div></div></div>'+(m.text?'<div class="moment-text">'+escHtml(m.text)+'</div>':'')+mediaHtml+'<div class="moment-actions-bar"><button class="'+(m.liked?'liked':'')+'" onclick="toggleLike('+realIdx+')">'+(m.liked?'❤️':'🤍')+' <span>'+(m.likes||0)+'</span></button><button>💬 评论</button><button class="del-moment" onclick="deleteMoment('+realIdx+')">删除</button></div>';
    feed.appendChild(div)
  })
}

  var notes=getNotes(),container=document.getElementById('noteDisplayCards');

  container.innerHTML='';var sorted=notes.slice().reverse(),moodLabels={'😊':'开心的时刻','🥰':'温暖的记忆','😌':'平静的时光','🤩':'惊喜的发现','😢':'柔软的感伤','💪':'给自己打气','🌟':'灵感一闪','📸':'摄影笔记'};
  sorted.forEach(function(note,i){var card=document.createElement('div');card.className='note-display-card reveal'+(i===0?' featured':'');card.innerHTML='<button class="nd-delete" onclick="deleteNote('+i+')" title="删除笔记">🗑️</button><span class="nd-mood">'+(note.mood||'📝')+'</span><div class="nd-title">'+escHtml(note.title)+'</div><div class="nd-date">'+note.time+'</div><div class="nd-body">'+escHtml(note.body)+'</div><span class="nd-memory-badge">'+(moodLabels[note.mood]||'随手记')+'</span>';container.appendChild(card)});
  setTimeout(function(){document.querySelectorAll('.note-display-card.reveal').forEach(function(el){observer.observe(el)})},100)
}

function handleAvatarUpload(event){
  var file=event.target.files[0];if(!file)return;
  if(!file.type.startsWith("image/")){showToast("请选择一张图片哦～");return}
  var reader=new FileReader();
  reader.onload=function(e){
    var imageData=e.target.result;
    localStorage.setItem("xx_avatar",imageData);
    updateAllAvatars(imageData);
    showToast("✨ 头像已更新～");
    if(!_syncing)syncPublish("avatar",imageData);
    
  };
  reader.readAsDataURL(file);event.target.value="";
}

function updateAllAvatars(imageData){
  var all=[document.getElementById('heroAvatar'),document.getElementById('navAvatar'),document.getElementById('composerAvatar')];
  all.forEach(function(container){
    if(!container)return;
    var existingImg=container.querySelector('img');if(existingImg)existingImg.remove();
    var emojiSpan=container.querySelector('.avatar-emoji');if(emojiSpan)emojiSpan.style.display='none';
    var img=document.createElement('img');img.src=imageData;img.alt='小傻贤的头像';
    img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;';
    container.appendChild(img);
  });
  var resetWrap=document.getElementById('avatarResetWrap');if(resetWrap)resetWrap.style.display='block';
  renderMoments();
}

function resetAvatar(){
  localStorage.removeItem('xx_avatar');
  var all=[document.getElementById('heroAvatar'),document.getElementById('navAvatar'),document.getElementById('composerAvatar')];
  all.forEach(function(container){
    if(!container)return;
    var img=container.querySelector('img');if(img)img.remove();
    var es=container.querySelector('.avatar-emoji');if(es)es.style.display='';
  });
  var resetWrap=document.getElementById('avatarResetWrap');if(resetWrap)resetWrap.style.display='none';
  document.getElementById('heroAvatarEmoji').textContent=moods[currentMood].avatar;
  renderMoments();showToast('已恢复默认头像');
}

// Manual sync button


// ═══ MQTT SYNC ═══
var _syncing=false,_mqttClient=null,_mqttConnected=false;

function showSyncStatus(st){
  var dot=document.getElementById('syncStatus');
  if(!dot)return;dot.className='sync-dot '+st;
  dot.title=st==='connected'?'🟢 实时同步中':st==='connecting'?'🟡 连接中...':'🔴 已断开';
}

function syncPublish(type,data){
  if(!_mqttConnected||_syncing)return;
  var ver=Date.now();
  try{
    // Real-time sync to peers
    _mqttClient.publish('xiaoxian/sync',JSON.stringify({type:type,data:data,version:ver}),{qos:0});
    // Retained cloud storage - new subscribers get this immediately
    _mqttClient.publish('xiaoxian/data/'+type,JSON.stringify(data),{qos:1,retain:true});
  }catch(e){}
}

function syncPublishAll(){
  if(!_mqttConnected||_syncing)return;
  try{var m=getMoments();if(m.length)syncPublish('moments',m)}catch(e){}
  try{var n=getNotes();if(n.length)syncPublish('notes',n)}catch(e){}
  var a=localStorage.getItem('xx_avatar');if(a){try{syncPublish('avatar',a)}catch(e){}}
}

function hasLocalData(){try{if(getMoments().length>0)return true}catch(e){}try{if(getNotes().length>0)return true}catch(e){}if(localStorage.getItem('xx_avatar'))return true;return false}

function initMQTT(){
  if(typeof mqtt==='undefined'){showSyncStatus('disconnected');return}
  try{
    showSyncStatus('connecting');
    _mqttClient=mqtt.connect('wss://broker-cn.emqx.io:8084/mqtt',{clientId:'xx_'+Math.random().toString(36).substring(2,10),clean:true,connectTimeout:10000,reconnectPeriod:5000});
    _mqttClient.on('connect',function(){
      _mqttConnected=true;showSyncStatus('connected');
      _mqttClient.subscribe('xiaoxian/sync',{qos:0},function(err){
        if(err)return;
        setTimeout(function(){if(hasLocalData())syncPublishAll();else try{_mqttClient.publish('xiaoxian/sync',JSON.stringify({type:'_request',version:Date.now()}),{qos:0})}catch(e){}},2000);
        _mqttClient.subscribe("xiaoxian/data/+",{qos:1});
      });
    });
    _mqttClient.on('message',function(topic,payload){
      try{
        if(topic.indexOf('xiaoxian/data/')===0){
          var type=topic.split('/')[2];var str=payload.toString();
          try{localStorage.setItem('xx_cloud_'+type,str);var d=JSON.parse(str);
            if(type==='moments'||type==='notes'){
              var cur=JSON.parse(localStorage.getItem('xx_'+type)||'[]');
              if(d.length>cur.length){localStorage.setItem('xx_'+type,JSON.stringify(d));
                if(type==='moments')renderMoments();if(type==='notes')renderNoteDisplay();updateTotalMemories()}
            }else if(type==='avatar'&&!localStorage.getItem('xx_avatar')){localStorage.setItem('xx_avatar',d);updateAllAvatars(d)}
          }catch(e){}
          return;
        }
        var msg=JSON.parse(payload.toString());
        if(msg.type==='_request'){syncPublishAll();return}
        var lv=parseInt(localStorage.getItem('xx_'+msg.type+'_ver')||'0');
        if(msg.version<=lv)return;
        _syncing=true;
        switch(msg.type){
          case'moments':localStorage.setItem('xx_moments',JSON.stringify(msg.data));localStorage.setItem('xx_moments_ver',msg.version);renderMoments();updateTotalMemories();break;
          case'notes':localStorage.setItem('xx_notes',JSON.stringify(msg.data));localStorage.setItem('xx_notes_ver',msg.version);renderNoteDisplay();updateTotalMemories();break;
          case'avatar':localStorage.setItem('xx_avatar',msg.data);localStorage.setItem('xx_avatar_ver',msg.version);updateAllAvatars(msg.data);break;
        }
        _syncing=false;
      }catch(e){_syncing=false}
    })
    _mqttClient.on('error',function(){showSyncStatus('disconnected')});
    _mqttClient.on('close',function(){_mqttConnected=false;showSyncStatus('disconnected')});
    _mqttClient.on('offline',function(){_mqttConnected=false;showSyncStatus('disconnected')});
  }catch(e){showSyncStatus('disconnected')}
}

setTimeout(initMQTT,800);
